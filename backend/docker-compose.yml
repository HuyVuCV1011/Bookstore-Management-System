#      - "5173:5173"
#    depends_on:
#      - backend

  cassandra:
    image: cassandra:5.0
    container_name: bookstore-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES;' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cassandra-init:
    image: cassandra:5.0
    container_name: bookstore-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./docker/cassandra/init-keyspace.sh:/init-keyspace.sh
    entrypoint: ["/bin/bash", "/init-keyspace.sh"]
    restart: "no"

  cassandra-web:
    image: ipushc/cassandra-web:latest
    container_name: bookstore-cassandra-web
    ports:
      - "3000:8083"
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_USERNAME: ""
      CASSANDRA_PASSWORD: ""
    depends_on:
      cassandra:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    container_name: bookstore-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  cassandra_data:
  neo4j_data:
