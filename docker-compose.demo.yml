name: bookstore-demo

services:
  postgres:
    image: postgres:15-alpine
    container_name: bookstore-demo-postgres
    environment:
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
      POSTGRES_DB: ${POSTGRES_DB:-bookstore}
      POSTGRES_USER: ${POSTGRES_USER:-bookstore_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookstore_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    container_name: bookstore-demo-neo4j
    environment:
      TZ: Asia/Ho_Chi_Minh
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
      NEO4J_db_temporal_timezone: Asia/Ho_Chi_Minh
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_demo_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: bookstore-demo-mongodb
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "27018:27017"
    volumes:
      - mongodb_demo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bookstore-demo-redis
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "6380:6379"
    volumes:
      - redis_demo_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  cassandra:
    image: cassandra:4.1
    container_name: bookstore-demo-cassandra
    environment:
      TZ: Asia/Ho_Chi_Minh
      CASSANDRA_CLUSTER_NAME: bookstore-events
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    ports:
      - "9044:9042"
    volumes:
      - cassandra_demo_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    container_name: bookstore-demo-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    command: >
      /bin/sh -c "cqlsh cassandra -e \"CREATE KEYSPACE IF NOT EXISTS ${CASSANDRA_KEYSPACE:-bookstore_events}
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};\""

  backend:
    build:
      context: ./backend
    container_name: bookstore-demo-backend
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bookstore}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bookstore_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USER:-neo4j}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${MONGODB_DB:-bookstore}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_CASSANDRA_PORT: 9042
      SPRING_CASSANDRA_LOCAL_DATACENTER: ${CASSANDRA_DATACENTER:-datacenter1}
      SPRING_CASSANDRA_KEYSPACE_NAME: ${CASSANDRA_KEYSPACE:-bookstore_events}
      JWT_SECRET: ${JWT_SECRET}
      SECURITY_CORS_ALLOWED_ORIGINS: ${SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost:5174,http://localhost:5173}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081/api}
    container_name: bookstore-demo-frontend
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5174:5173"
    depends_on:
      - backend

volumes:
  postgres_demo_data:
  neo4j_demo_data:
  mongodb_demo_data:
  redis_demo_data:
  cassandra_demo_data:
