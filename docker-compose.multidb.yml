name: bookstore-multidb

services:
  postgres:
    image: postgres:15-alpine
    container_name: bookstore-multidb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookstore}
      POSTGRES_USER: ${POSTGRES_USER:-bookstore_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_multidb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookstore_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    container_name: bookstore-multidb-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_multidb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: bookstore-multidb-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_multidb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bookstore-multidb-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_multidb_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: bookstore-multidb-backend
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bookstore}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bookstore_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USER:-neo4j}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${MONGODB_DB:-bookstore}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8081/api
    container_name: bookstore-multidb-frontend
    ports:
      - "5174:5173"
    depends_on:
      - backend

volumes:
  postgres_multidb_data:
  neo4j_multidb_data:
  mongodb_multidb_data:
  redis_multidb_data:
